name: astrbot_plugin_msg_forward_cc # 插件唯一识别名，以 astrbot_plugin_ 前缀开头
display_name: MsgForwardCC（跨平台消息转发） # 用于展示的名字，可以是方便人类阅读的名字（需要版本 >= v4.5.0，低版本不会报错，请放心填写）
desc: 一个用于在不同聊天端点之间转发与同步消息的 AstrBot 插件，支持对转发规则设置来源信息显示状态（允许/禁止显示来源）。 # 插件简短描述
version: v0.2.0 # 插件版本号。格式：v1.1.1 或者 v1.1
author: XTsat # 作者
repo: https://github.com/XTsat/astrbot_plugin_msg_forward_cc # 插件的仓库地址
